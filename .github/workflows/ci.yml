name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install -U pip setuptools wheel
          # If the somafractalmemory package exists locally in the workspace,
          # install it first so pip can satisfy the somafractalmemory>=... requirement
          if [ -d somafractalmemory ]; then
            python -m pip install -e ./somafractalmemory || python -m pip install ./somafractalmemory
          fi
          python -m pip install -e .[dev]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verify install
        run: |
          echo "Verifying important packages are installed"
          python -c "import importlib, sys; importlib.import_module('fastapi'); print('fastapi ok')" || (python -m pip freeze | head -n 80 && exit 1)
          python -m pip show fastapi || true
      - name: Lint
        continue-on-error: true
        run: |
          ruff check . || true
      - name: Tests
        env:
          PYTHONPATH: .
          SOMABRAIN_MEMORY_MODE: stub
          SOMABRAIN_MINIMAL_PUBLIC_API: '0'
        run: |
          pytest -q
  bench:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        continue-on-error: true
        run: |
          python -m pip install -U pip setuptools wheel
          # If the somafractalmemory package exists locally in the workspace,
          # install it first so pip can satisfy the somafractalmemory>=... requirement
          if [ -d somafractalmemory ]; then
            python -m pip install -e ./somafractalmemory || python -m pip install ./somafractalmemory
          fi
          pip install -e .[dev]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run cognition benchmark
        continue-on-error: true
        env:
          PYTHONPATH: .
          MPLBACKEND: Agg
        run: |
          python benchmarks/cognition_core_bench.py || true
      - name: Upload benchmark artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cognition-benchmark
          path: |
            benchmarks/cognition_quality.csv
            benchmarks/cognition_latency.csv
            benchmarks/cognition_cosine.png
            benchmarks/cognition_unbind_p99.png
