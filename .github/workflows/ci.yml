name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dev deps
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements-dev.txt
      - name: Pre-commit hooks
        run: |
          pip install pre-commit
          pre-commit run --all-files
      - name: Lint & formatting checks
        run: |
          ruff check .
          black --check .
          isort --check-only .
      - name: Tests
        env:
          PYTHONPATH: .
          SOMABRAIN_MEMORY_MODE: stub
          SOMABRAIN_MINIMAL_PUBLIC_API: '0'
        run: |
          pytest -q
      - name: Build docs (fail on warnings)
        run: |
          # Build and fail if warnings are emitted
          sphinx-build -b html -W docs/source docs/build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e .[dev]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint
        continue-on-error: true
        run: |
          ruff check . || true
      - name: Tests
        env:
          PYTHONPATH: .
          SOMABRAIN_MEMORY_MODE: stub
          SOMABRAIN_MINIMAL_PUBLIC_API: '0'
        run: |
          pytest -q
  bench:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        continue-on-error: true
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e .[dev]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run cognition benchmark
        continue-on-error: true
        env:
          PYTHONPATH: .
          MPLBACKEND: Agg
        run: |
          python benchmarks/cognition_core_bench.py || true
      - name: Upload benchmark artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cognition-benchmark
          path: |
            benchmarks/cognition_quality.csv
            benchmarks/cognition_latency.csv
            benchmarks/cognition_cosine.png
            benchmarks/cognition_unbind_p99.png
