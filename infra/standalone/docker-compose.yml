name: somabrain

services:
  somabrain_standalone_redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - somabrain_standalone_net
    ports:
      - "${REDIS_HOST_PORT:-30100}:${REDIS_CONTAINER_PORT:-6379}"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    # Production-like Redis configuration with persistence and memory management
    command:
      - redis-server
      - --maxmemory
      - "800mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
      - --tcp-keepalive
      - "300"
      - --timeout
      - "0"
      - --tcp-backlog
      - "511"
      - --databases
      - "16"
      - --loglevel
      - "notice"

  somabrain_standalone_kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    environment:
      # Production-like Kafka configuration for constrained environment
      KAFKA_CFG_NODE_ID: ${KAFKA_CFG_NODE_ID:-1}
      KAFKA_CFG_PROCESS_ROLES: ${KAFKA_CFG_PROCESS_ROLES:-broker,controller}
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CFG_CONTROLLER_QUORUM_VOTERS:-1@localhost:9093}
      KAFKA_CFG_LISTENERS: ${KAFKA_CFG_LISTENERS:-INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093}
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://somabrain_standalone_kafka:9092,EXTERNAL://localhost:30102
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: ${KAFKA_CFG_CONTROLLER_LISTENER_NAMES:-CONTROLLER}
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: ${KAFKA_CFG_INTER_BROKER_LISTENER_NAME:-INTERNAL}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT}
      # Production settings
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_MIN_INSYNC_REPLICAS: 1
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Storage and retention (production-like)
      KAFKA_CFG_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_CFG_LOG_RETENTION_MS: "604800000"
      KAFKA_CFG_LOG_RETENTION_BYTES: "1073741824"
      KAFKA_CFG_LOG_SEGMENT_BYTES: "67108864"
      KAFKA_CFG_LOG_CLEANUP_POLICY: "delete"
      KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"
      # Performance tuning
      KAFKA_CFG_COMPRESSION_TYPE: "snappy"
      KAFKA_CFG_MESSAGE_MAX_BYTES: "1048576"
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: "1048576"
      KAFKA_CFG_NUM_IO_THREADS: "4"
      KAFKA_CFG_NUM_NETWORK_THREADS: "3"
      KAFKA_CFG_NUM_REPLICA_FETCHERS: "1"
      KAFKA_CFG_SOCKET_SEND_BUFFER_BYTES: "102400"
      KAFKA_CFG_SOCKET_RECEIVE_BUFFER_BYTES: "102400"
      KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES: "104857600"
      # JVM settings for constrained memory
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms512m"
      KAFKA_JVM_PERFORMANCE_OPTS: "-server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35 -XX:+ExplicitGCInvokesConcurrent"
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-79LccNO-Qe6G6YgqP1Zrew}
      KAFKA_BROKER_HOST_PORT: ${KAFKA_BROKER_HOST_PORT:-30102}
      KAFKA_BROKER_CONTAINER_PORT: ${KAFKA_BROKER_CONTAINER_PORT:-9092}
    volumes:
      # Persist Kafka broker data in the correct data directory.
      # The apache/kafka image uses /var/lib/kafka/data for logs; mounting at that
      # exact path avoids Docker creating an anonymous volume that overrides persistence.
      - kafka_data:/var/lib/kafka/data
    command:
      - bash
      - -c
      - |
        set -e
        mkdir -p /var/lib/kafka/data
        CONFIG_PATH=/tmp/kafka-server.properties
        cp /opt/kafka/config/kraft/server.properties "$${CONFIG_PATH}"
        {
          echo "process.roles=$${KAFKA_CFG_PROCESS_ROLES}"
          echo "node.id=$${KAFKA_CFG_NODE_ID}"
          # Some base configs may still read broker.id; set it explicitly for safety
          echo "broker.id=$${KAFKA_CFG_NODE_ID}"
          echo "controller.listener.names=$${KAFKA_CFG_CONTROLLER_LISTENER_NAMES}"
          echo "controller.quorum.voters=$${KAFKA_CFG_CONTROLLER_QUORUM_VOTERS}"
          echo "listeners=$${KAFKA_CFG_LISTENERS}"
          echo "advertised.listeners=$${KAFKA_CFG_ADVERTISED_LISTENERS}"
          echo "listener.security.protocol.map=$${KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP}"
          echo "inter.broker.listener.name=$${KAFKA_CFG_INTER_BROKER_LISTENER_NAME}"
          echo "log.dirs=$${KAFKA_CFG_LOG_DIRS}"
          echo "auto.create.topics.enable=$${KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE}"
          echo "num.partitions=$${KAFKA_CFG_NUM_PARTITIONS}"
          echo "default.replication.factor=$${KAFKA_CFG_DEFAULT_REPLICATION_FACTOR}"
          echo "offsets.topic.replication.factor=$${KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR}"
          echo "transaction.state.log.replication.factor=$${KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}"
          echo "transaction.state.log.min.isr=$${KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR}"
          echo "compression.type=$${KAFKA_CFG_COMPRESSION_TYPE}"
          echo "log.retention.ms=$${KAFKA_CFG_LOG_RETENTION_MS}"
          echo "log.segment.bytes=$${KAFKA_CFG_LOG_SEGMENT_BYTES}"
          echo "log.retention.bytes=$${KAFKA_CFG_LOG_RETENTION_BYTES}"
        } >> "$${CONFIG_PATH}"
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format --ignore-formatted --cluster-id ${KAFKA_CLUSTER_ID:-79LccNO-Qe6G6YgqP1Zrew} --config "$${CONFIG_PATH}"
        fi
        exec /opt/kafka/bin/kafka-server-start.sh "$${CONFIG_PATH}"
    ports:
      # Expose only the EXTERNAL listener container port to the host
      - "${KAFKA_BROKER_HOST_PORT:-30102}:${KAFKA_BROKER_EXTERNAL_CONTAINER_PORT:-9094}"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/::1/9092' 2>/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 10
    networks:
      - somabrain_standalone_net

  # --- Kafka topic bootstrap ----------------------------------------------
  somabrain_standalone_kafka_topics_init:
    image: apache/kafka:3.7.0
    restart: "no"
    depends_on:
      somabrain_standalone_kafka:
        condition: service_healthy
    networks:
      - somabrain_standalone_net
    environment:
      KAFKA_BROKER_CONTAINER_PORT: ${KAFKA_BROKER_CONTAINER_PORT:-9092}
    command:
      - bash
      - -c
      - |
        set -e
        BOOTSTRAP="somabrain_standalone_kafka:$${KAFKA_BROKER_CONTAINER_PORT}"
        TOPICS=(
          cog.global.frame
          cog.next_event
          cog.action.updates
          cog.state.updates
          cog.agent.updates
          cog.config.updates
          cog.segments
        )
        for t in "$${TOPICS[@]}"; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$${BOOTSTRAP}" \
            --create --if-not-exists \
            --topic "$${t}" \
            --partitions 3 \
            --replication-factor 1
        done
        echo "Kafka topics initialized."

  somabrain_standalone_kafka_exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    restart: unless-stopped
    command:
      - --kafka.server=somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    depends_on:
      somabrain_standalone_kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_EXPORTER_HOST_PORT:-30103}:${KAFKA_EXPORTER_CONTAINER_PORT:-9308}"
    networks:
      - somabrain_standalone_net
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:9308/" ]
      interval: 30s
      timeout: 5s
      retries: 3

  somabrain_standalone_schema_registry:
    image: confluentinc/cp-schema-registry:7.6.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}"
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms128m -Xmx192m"
    depends_on:
      somabrain_standalone_kafka:
        condition: service_healthy
    networks:
      - somabrain_standalone_net
    ports:
      - "${SCHEMA_REGISTRY_HOST_PORT:-30108}:8081"
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:8081/subjects" ]
      interval: 30s
      timeout: 5s
      retries: 3

  somabrain_standalone_opa:
    image: openpolicyagent/opa:0.54.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    # Production-like OPA configuration with decision logging and metrics
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --diagnostic-addr=0.0.0.0:8282
      - --log-level=error
      - --log-format=json
      - --set=decision_logs.console=true
      - --set=status.console=true
      - --set=default_decision=somabrain/auth/allow
      - /policies
    networks:
      - somabrain_standalone_net
    ports:
      - "${OPA_HOST_PORT:-30104}:${OPA_CONTAINER_PORT:-8181}"
    volumes:
      - ./ops/opa/policies:/policies:ro
      - opa_data:/var/lib/opa
    healthcheck:
      # OPA's minimal image lacks curl/wget. Use OPA's built-in check command
      # which verifies the server is running and policies are loaded.
      test: [ "CMD", "/opa", "check", "/policies" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  somabrain_standalone_prometheus:
    image: prom/prometheus:v2.49.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - somabrain_standalone_net
    ports:
      - "${PROMETHEUS_HOST_PORT:-30105}:${PROMETHEUS_CONTAINER_PORT:-9090}"
    volumes:
      - ../../infra/ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Production-like Prometheus configuration
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=512MB
      - --storage.tsdb.min-block-duration=2h
      - --storage.tsdb.max-block-duration=2h
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
      - --web.enable-admin-api
      - --log.level=warn
      - --log.format=json
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 5s
      retries: 3

  somabrain_standalone_jaeger:
    image: jaegertracing/all-in-one:1.53
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - somabrain_standalone_net
    ports:
      - "${JAEGER_HOST_PORT:-30111}:16686"
      - "30112:14250"
      - "30113:14268"
      - "30114:4317"
      - "30117:4318"
    environment:
      # Production-like Jaeger configuration (memory storage for constrained local dev)
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "memory"
      MEMORY_MAX_TRACES: "10000"
      LOG_LEVEL: "warn"
      QUERY_MAX_CLOCK_SKEW_ADJUSTMENT: "0s"
      METRICS_BACKEND: "prometheus"
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:16686/" ]
      interval: 30s
      timeout: 5s
      retries: 3

  somabrain_standalone_postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-somabrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-somabrain}
      # Production-like PostgreSQL tuning for constrained environment
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_HOST_PORT:-30106}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - somabrain_standalone_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-somabrain} -d ${POSTGRES_DB:-somabrain}" ]
      interval: 30s
      timeout: 5s
      retries: 3
    # Production-like PostgreSQL configuration
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - work_mem=4MB
      - -c
      - max_connections=100
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=4MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - min_wal_size=80MB
      - -c
      - max_wal_size=1GB
      - -c
      - log_statement=none
      - -c
      - log_duration=off
      - -c
      - log_min_duration_statement=1000
      - -c
      - autovacuum=on
      - -c
      - autovacuum_max_workers=2

  # --- Vault secrets (30xxx range infrastructure) ----------------------------
  somabrain_standalone_vault:
    image: hashicorp/vault:1.13.3
    container_name: somabrain_standalone_vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      # Brain-range Vault port: 30200
      - "30200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somabrain_standalone_net

  # --- Vault init helper -----------------------------------------------------
  somabrain_standalone_vault_init:
    image: alpine:latest
    container_name: somabrain_standalone_vault_init
    depends_on:
      somabrain_standalone_vault:
        condition: service_healthy
    environment:
      SOMABRAIN_VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"
      POSTGRES_USER: "${POSTGRES_USER:-somabrain}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-somabrain}"
      SOMABRAIN_REDIS_URL: "${SOMABRAIN_REDIS_URL:-redis://somabrain_standalone_redis:6379/0}"
      SOMABRAIN_JWT_SECRET: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SOMABRAIN_MEMORY_HTTP_TOKEN: "${SOMABRAIN_MEMORY_HTTP_TOKEN:?set SOMABRAIN_MEMORY_HTTP_TOKEN}"
      SUPERVISOR_HTTP_PASS: "${SUPERVISOR_HTTP_PASS:?set SUPERVISOR_HTTP_PASS}"
      SOMABRAIN_API_TOKEN: "${SOMABRAIN_API_TOKEN:-}"
    networks:
      - somabrain_standalone_net
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        apk add --no-cache curl jq
        # Wait for vault
        until curl -s http://somabrain_standalone_vault:8200/v1/sys/health; do sleep 1; done

        # Mount KV v2
        curl -H "X-Vault-Token: $${SOMABRAIN_VAULT_TOKEN}" -X POST -d '{"type":"kv-v2"}' http://somabrain_standalone_vault:8200/v1/sys/mounts/somabrain

        # 1. Database Credentials
        curl -H "X-Vault-Token: $${SOMABRAIN_VAULT_TOKEN}" -X POST \
          -d "{\"data\": {\"username\": \"$${POSTGRES_USER}\", \"password\": \"$${POSTGRES_PASSWORD}\", \"host\": \"somabrain_standalone_postgres\", \"port\": 5432, \"dbname\": \"$${POSTGRES_DB}\"}}" \
          http://somabrain_standalone_vault:8200/v1/somabrain/data/database

        # 2. Redis Credentials
        curl -H "X-Vault-Token: $${SOMABRAIN_VAULT_TOKEN}" -X POST \
          -d "{\"data\": {\"url\": \"$${SOMABRAIN_REDIS_URL}\"}}" \
          http://somabrain_standalone_vault:8200/v1/somabrain/data/redis

        # 3. JWT Secret
        curl -H "X-Vault-Token: $${SOMABRAIN_VAULT_TOKEN}" -X POST \
          -d "{\"data\": {\"jwt_secret\": \"$${SOMABRAIN_JWT_SECRET}\"}}" \
          http://somabrain_standalone_vault:8200/v1/somabrain/data/auth

        # 4. Runtime service secrets
        curl -H "X-Vault-Token: $${SOMABRAIN_VAULT_TOKEN}" -X POST \
          -d "{\"data\": {\"memory_http_token\": \"$${SOMABRAIN_MEMORY_HTTP_TOKEN}\", \"supervisor_http_pass\": \"$${SUPERVISOR_HTTP_PASS}\", \"api_token\": \"$${SOMABRAIN_API_TOKEN}\"}}" \
          http://somabrain_standalone_vault:8200/v1/somabrain/data/runtime

        echo "Vault initialized and secrets populated."

  somabrain_standalone_db_migrate:
    image: somabrain:latest
    depends_on:
      somabrain_standalone_vault_init:
        condition: service_completed_successfully
      somabrain_standalone_postgres:
        condition: service_healthy
    networks:
      - somabrain_standalone_net
    environment:
      # VAULT BOOTSTRAP ONLY
      VAULT_ADDR: "http://somabrain_standalone_vault:8200"
      VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"
      DJANGO_SETTINGS_MODULE: "somabrain.settings.standalone"
      RUNNING_IN_DOCKER: "true"
    # Dev convenience: run Django migrations.
    command: [ "sh", "-lc", "cd /app && python manage.py migrate --noinput" ]
    restart: "no"
    profiles: [ "dev" ]

  somabrain_standalone_postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-somabrain}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@somabrain_standalone_postgres:5432/${POSTGRES_DB:-somabrain}?sslmode=disable
    depends_on:
      somabrain_standalone_postgres:
        condition: service_healthy
    ports:
      - "${POSTGRES_EXPORTER_HOST_PORT:-30107}:${POSTGRES_EXPORTER_CONTAINER_PORT:-9187}"
    networks:
      - somabrain_standalone_net
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:9187/" ]
      interval: 30s
      timeout: 5s
      retries: 3

  somabrain_standalone_app:
    build:
      context: ../..
      dockerfile: infra/standalone/Dockerfile
    image: somabrain:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    depends_on:
      somabrain_standalone_vault_init:
        condition: service_completed_successfully
      somabrain_standalone_redis:
        condition: service_healthy
      somabrain_standalone_kafka:
        condition: service_healthy
      somabrain_standalone_opa:
        condition: service_healthy
      somabrain_standalone_postgres:
        condition: service_healthy
    #      somabrain_standalone_milvus:
    #        condition: service_healthy
    networks:
      - somabrain_standalone_net
    # Ensure containers can reach host services (e.g., external memory on 10101)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../somabrain:/app/somabrain:ro
      - ../../scripts:/app/scripts:ro
    tmpfs:
      - /app/logs:rw,size=64m,mode=1777
      - /tmp:rw,size=64m,mode=1777
    environment:
      # Django settings MUST be set for standalone scripts like initialize_runtime.py
      DJANGO_SETTINGS_MODULE: "somabrain.settings.standalone"
      RUNNING_IN_DOCKER: "true"
      # Host headers seen by the app container (healthchecks, host-bound curl, Docker Desktop proxy)
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1,host.docker.internal,somabrain_standalone_app}"
      # Gunicorn writes its control socket to $HOME; tmpfs /tmp keeps it writable.
      HOME: "/tmp"

      # VAULT BOOTSTRAP ONLY
      VAULT_ADDR: "http://somabrain_standalone_vault:8200"
      VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"

      # Resolved secrets required before Django settings import.
      # Vault bootstrap also provides these, but explicit env values keep the
      # container runnable when Vault is temporarily unavailable.
      SOMABRAIN_JWT_SECRET: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SECRET_KEY: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SOMABRAIN_MEMORY_HTTP_TOKEN: "${SOMABRAIN_MEMORY_HTTP_TOKEN:?set SOMABRAIN_MEMORY_HTTP_TOKEN}"
      # Use the internal Postgres service name; the host-bound port is not reachable from the container.
      SOMABRAIN_POSTGRES_DSN: "postgresql://${POSTGRES_USER:-somabrain}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@somabrain_standalone_postgres:5432/${POSTGRES_DB:-somabrain}"

      # Configuration Pass-throughs (No hardcoded URLs)
      SOMABRAIN_HOST: "${SOMABRAIN_HOST:-0.0.0.0}"
      SOMABRAIN_PORT: "${SOMABRAIN_PORT:-30101}"
      SOMABRAIN_WORKERS: "${SOMABRAIN_WORKERS:-1}"
      SOMABRAIN_OPA_URL: "http://somabrain_standalone_opa:8181"
      SOMABRAIN_KAFKA_URL: "kafka://somabrain_standalone_kafka:9092"
      # Default memory endpoint:
      #   - Standalone on macOS/Windows Docker Desktop: http://host.docker.internal:10101
      #   - Shared network / Linux: override to http://somafractalmemory-standalone-api:10101
      SOMABRAIN_MEMORY_HTTP_ENDPOINT: "${SOMABRAIN_MEMORY_HTTP_ENDPOINT:-http://host.docker.internal:10101}"

      # Feature Flags
      SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS: "${SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS:-1}"
      SOMABRAIN_FORCE_FULL_STACK: "${SOMABRAIN_FORCE_FULL_STACK:-1}"
      SOMABRAIN_REQUIRE_MEMORY: "${SOMABRAIN_REQUIRE_MEMORY:-1}"
      SOMABRAIN_PREDICTOR_PROVIDER: "${SOMABRAIN_PREDICTOR_PROVIDER:-mahal}"
      # Memory weighting is controlled by runtime config overrides (local only)
      SOMABRAIN_DEFAULT_TENANT: "${SOMABRAIN_DEFAULT_TENANT:-standalone}"
      SOMA_DEPLOY_MODE: "${SOMA_DEPLOY_MODE:-FULL_LOCAL}"
      SOMABRAIN_MODE: "${SOMABRAIN_MODE:-full-local}"
      SOMABRAIN_ANN_BACKEND: "${SOMABRAIN_ANN_BACKEND:-none}"
      SUPERVISOR_HTTP_USER: "${SUPERVISOR_HTTP_USER:-admin}"
      # Adaptive knobs are controlled by runtime config overrides (local only)
      SOMABRAIN_LEARNING_TENANTS_FILE: "${SOMABRAIN_LEARNING_TENANTS_FILE:-/app/config/learning.tenants.yaml}"
      # Disable Kafka readiness check for local dev (tests/smoke/kafka_smoke_test.py not included)
    ports:
      - "${SOMABRAIN_HOST_PORT:-30101}:${SOMABRAIN_PORT:-30101}"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:${SOMABRAIN_PORT:-30101}/health || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    # No local journal volume; fail-fast only
    # Security hardening: drop all capabilities, run with read-only rootfs, and disallow privilege escalation.
    # Note: we mount a tmpfs for /app/logs to keep runtime logs writable.
    cap_drop: [ "ALL" ]
    read_only: true
    security_opt:
      - no-new-privileges:true

  somabrain_standalone_cog:
    build:
      context: ../..
      dockerfile: infra/standalone/Dockerfile
    image: somabrain:latest
    restart: unless-stopped
    depends_on:
      somabrain_standalone_vault_init:
        condition: service_completed_successfully
      somabrain_standalone_postgres:
        condition: service_healthy
      somabrain_standalone_redis:
        condition: service_healthy
      somabrain_standalone_kafka:
        condition: service_healthy
      somabrain_standalone_kafka_topics_init:
        condition: service_completed_successfully
      somabrain_standalone_opa:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Production-like allocation for cognitive services
          memory: 3G
        reservations:
          memory: 2G
    networks:
      - somabrain_standalone_net
    environment:
      DJANGO_SETTINGS_MODULE: "somabrain.settings.standalone"
      RUNNING_IN_DOCKER: "true"

      # VAULT BOOTSTRAP ONLY
      VAULT_ADDR: "http://somabrain_standalone_vault:8200"
      VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"

      # Resolved secrets required before Django settings import.
      # Vault bootstrap only runs in WSGI/ASGI entrypoints; workers import settings directly.
      SOMABRAIN_JWT_SECRET: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SECRET_KEY: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SOMABRAIN_MEMORY_HTTP_TOKEN: "${SOMABRAIN_MEMORY_HTTP_TOKEN:?set SOMABRAIN_MEMORY_HTTP_TOKEN}"
      # Use the internal Postgres service name; the host-bound port is not reachable from the container.
      SOMABRAIN_POSTGRES_DSN: "postgresql://${POSTGRES_USER:-somabrain}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@somabrain_standalone_postgres:5432/${POSTGRES_DB:-somabrain}"
      SOMABRAIN_MEMORY_HTTP_ENDPOINT: "${SOMABRAIN_MEMORY_HTTP_ENDPOINT:-http://host.docker.internal:10101}"

      # Configuration Pass-throughs
      SOMABRAIN_STRICT_REAL: "1"
      SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS: "${SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS:-1}"
      SOMABRAIN_REQUIRE_MEMORY: "${SOMABRAIN_REQUIRE_MEMORY:-1}"
      SOMABRAIN_MODE: "full-local"
      SOMA_HEAT_METHOD: "lanczos"
      # Enable OTEL tracing to Jaeger collector
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://somabrain_standalone_jaeger:4318"
      OTEL_SERVICE_NAME: "somabrain-cog"
      SOMABRAIN_DEFAULT_TENANT: "${SOMABRAIN_DEFAULT_TENANT:-standalone}"
      # Supervisor HTTP auth used by API for control; only on internal network
      SUPERVISOR_HTTP_USER: "${SUPERVISOR_HTTP_USER:-admin}"
      # Keep cognition in sync for observability (no functional dependency)
      # Adaptive knobs are controlled by runtime config overrides (local only)
      SOMABRAIN_LEARNING_TENANTS_FILE: "${SOMABRAIN_LEARNING_TENANTS_FILE:-/app/config/learning.tenants.yaml}"
      # Program-specific ports (supervisor will pass to processes)
      REWARD_PRODUCER_PORT: "${REWARD_PRODUCER_PORT:-8083}"
      SOMABRAIN_TOPIC_STATE_UPDATES: "${SOMABRAIN_TOPIC_STATE_UPDATES:-cog.state.updates}"
      SOMABRAIN_TOPIC_AGENT_UPDATES: "${SOMABRAIN_TOPIC_AGENT_UPDATES:-cog.agent.updates}"
      SOMABRAIN_TOPIC_ACTION_UPDATES: "${SOMABRAIN_TOPIC_ACTION_UPDATES:-cog.action.updates}"
      SOMABRAIN_TOPIC_GLOBAL_FRAME: "${SOMABRAIN_TOPIC_GLOBAL_FRAME:-cog.global.frame}"
      SOMABRAIN_TOPIC_NEXT_EVENT: "${SOMABRAIN_TOPIC_NEXT_EVENT:-cog.next_event}"
      SOMABRAIN_TOPIC_SEGMENTS: "${SOMABRAIN_TOPIC_SEGMENTS:-cog.segments}"
      SOMABRAIN_TOPIC_CONFIG_UPDATES: "${SOMABRAIN_TOPIC_CONFIG_UPDATES:-cog.config.updates}"
      # Milvus removed: brain uses SFM's Milvus instead
    ports:
      # Reward producer HTTP (host default 30083)
      - "${COG_REWARD_PRODUCER_HOST_PORT:-30083}:8083"
      # Integrator health/metrics (program-level env set below via supervisor env)
      - "${COG_INTEGRATOR_HEALTH_HOST_PORT:-30010}:9010"
      # Segmentation health
      - "${SEGMENTATION_HEALTH_HOST_PORT:-30116}:9016"
    command:
      - sh
      - -lc
      - >-
        export SUPERVISOR_HTTP_PASS="$$(python -c "from somabrain.core.security.vault_client import get_runtime_secret; print(get_runtime_secret('supervisor_http_pass'))")"
        && exec /usr/bin/supervisord -c /app/ops/supervisor/supervisord.conf -l /dev/stdout
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PASS="$$(python -c "from somabrain.core.security.vault_client import get_runtime_secret; print(get_runtime_secret('supervisor_http_pass'))")" &&
          curl -fsS "http://$${SUPERVISOR_HTTP_USER:-admin}:$${PASS}@localhost:9001" >/dev/null
      interval: 30s
      timeout: 5s
      retries: 5
    cap_drop: [ "ALL" ]
    # read_only disabled to allow supervisor tmp/log paths in minimal dev
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /app/logs:rw,size=64m,mode=1777
      - /tmp:rw,size=64m,mode=1777

  somabrain_standalone_outbox_publisher:
    build:
      context: ../..
      dockerfile: infra/standalone/Dockerfile
    image: somabrain:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      somabrain_standalone_vault_init:
        condition: service_completed_successfully
      somabrain_standalone_kafka:
        condition: service_healthy
      somabrain_standalone_postgres:
        condition: service_healthy
    networks:
      - somabrain_standalone_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "-m", "somabrain.workers.outbox_publisher" ]
    environment:
      # Django settings MUST be first - required for all Django workers
      DJANGO_SETTINGS_MODULE: "somabrain.settings.standalone"
      RUNNING_IN_DOCKER: "true"

      # VAULT BOOTSTRAP ONLY
      VAULT_ADDR: "http://somabrain_standalone_vault:8200"
      VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"

      # Resolved secrets required before Django settings import.
      SOMABRAIN_JWT_SECRET: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SECRET_KEY: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SOMABRAIN_MEMORY_HTTP_TOKEN: "${SOMABRAIN_MEMORY_HTTP_TOKEN:?set SOMABRAIN_MEMORY_HTTP_TOKEN}"
      # Use the internal Postgres service name; the host-bound port is not reachable from the container.
      SOMABRAIN_POSTGRES_DSN: "postgresql://${POSTGRES_USER:-somabrain}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@somabrain_standalone_postgres:5432/${POSTGRES_DB:-somabrain}"
      SOMABRAIN_MEMORY_HTTP_ENDPOINT: "${SOMABRAIN_MEMORY_HTTP_ENDPOINT:-http://host.docker.internal:10101}"

      SOMABRAIN_PREDICTOR_PROVIDER: "${SOMABRAIN_PREDICTOR_PROVIDER:-mahal}"
      SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS: "${SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS:-1}"
      SOMABRAIN_FORCE_FULL_STACK: "${SOMABRAIN_FORCE_FULL_STACK:-1}"
      SOMABRAIN_OUTBOX_BATCH_SIZE: ${SOMABRAIN_OUTBOX_BATCH_SIZE:-100}
      SOMABRAIN_OUTBOX_MAX_DELAY: ${SOMABRAIN_OUTBOX_MAX_DELAY:-5.0}
      # Propagate the global memory cap to the outbox publisher.
      SOMABRAIN_MEMORY_MAX: "${SOMABRAIN_MEMORY_MAX:-10GB}"
      SOMABRAIN_KAFKA_URL: "kafka://somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}"
    # No journal mount required
    cap_drop: [ "ALL" ]
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /app/logs:rw,size=64m,mode=1777
      - /tmp:rw,size=64m,mode=1777
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 30s
      timeout: 5s
      retries: 1

  # --- MinIO object storage (used by SFM, not brain-local Milvus) -----------
  somabrain_standalone_minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    hostname: minio
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - minio_data:/minio_data
    ports:
      - "30109:9000"
      - "30110:9001"
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      somabrain_standalone_net:
        aliases:
          - minio

  # --- Cognitive Thread: Predictors ----------------------------------------

  # --- Cognitive Thread: Integrator + Segmentation + Orchestrator ----------

  somabrain_standalone_integrator_triplet:
    build:
      context: ../..
      dockerfile: infra/standalone/Dockerfile
    image: somabrain:latest
    restart: unless-stopped
    depends_on:
      somabrain_standalone_vault_init:
        condition: service_completed_successfully
      somabrain_standalone_kafka:
        condition: service_healthy
      somabrain_standalone_kafka_topics_init:
        condition: service_completed_successfully
    networks:
      - somabrain_standalone_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Django settings MUST be first - required for all Django workers
      DJANGO_SETTINGS_MODULE: "somabrain.settings.standalone"
      RUNNING_IN_DOCKER: "true"

      # VAULT BOOTSTRAP ONLY
      VAULT_ADDR: "http://somabrain_standalone_vault:8200"
      VAULT_TOKEN: "${SOMABRAIN_VAULT_TOKEN:?set SOMABRAIN_VAULT_TOKEN}"

      # Resolved secrets required before Django settings import.
      SOMABRAIN_JWT_SECRET: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SECRET_KEY: "${SOMABRAIN_JWT_SECRET:?set SOMABRAIN_JWT_SECRET}"
      SOMABRAIN_MEMORY_HTTP_TOKEN: "${SOMABRAIN_MEMORY_HTTP_TOKEN:?set SOMABRAIN_MEMORY_HTTP_TOKEN}"
      # Use the internal Postgres service name; the host-bound port is not reachable from the container.
      SOMABRAIN_POSTGRES_DSN: "postgresql://${POSTGRES_USER:-somabrain}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@somabrain_standalone_postgres:5432/${POSTGRES_DB:-somabrain}"
      SOMABRAIN_MEMORY_HTTP_ENDPOINT: "${SOMABRAIN_MEMORY_HTTP_ENDPOINT:-http://host.docker.internal:10101}"

      # Propagate the global memory cap to the integrator service.
      SOMABRAIN_MEMORY_MAX: "${SOMABRAIN_MEMORY_MAX:-10GB}"
      SOMABRAIN_KAFKA_URL: "kafka://somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}"
      KAFKA_BOOTSTRAP_SERVERS: "somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}"
      SOMA_KAFKA_BOOTSTRAP: "somabrain_standalone_kafka:${KAFKA_BROKER_CONTAINER_PORT:-9092}"
      SOMABRAIN_TOPIC_STATE_UPDATES: "${SOMABRAIN_TOPIC_STATE_UPDATES:-cog.state.updates}"
      SOMABRAIN_TOPIC_AGENT_UPDATES: "${SOMABRAIN_TOPIC_AGENT_UPDATES:-cog.agent.updates}"
      SOMABRAIN_TOPIC_GLOBAL_FRAME: "${SOMABRAIN_TOPIC_GLOBAL_FRAME:-cog.global.frame}"
      SOMABRAIN_TOPIC_NEXT_EVENT: "${SOMABRAIN_TOPIC_NEXT_EVENT:-cog.next_event}"
      SOMABRAIN_TOPIC_CONFIG_UPDATES: "${SOMABRAIN_TOPIC_CONFIG_UPDATES:-cog.config.updates}"
      SOMABRAIN_STRICT_REAL: "1"
      SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS: "${SOMABRAIN_REQUIRE_EXTERNAL_BACKENDS:-1}"
      SOMABRAIN_REQUIRE_MEMORY: "${SOMABRAIN_REQUIRE_MEMORY:-1}"
    command: [ "python", "-m", "somabrain.services.integrator_hub_triplet" ]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 192M
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:9015/health" ]
      interval: 30s
      timeout: 5s
      retries: 1
    ports:
      - "${INTEGRATOR_HEALTH_HOST_PORT:-30115}:9015"

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  opa_data:
    driver: local
  prometheus_data:
    driver: local
  jaeger_data:
    driver: local
  minio_data:
    driver: local

# Shared-network option:
#   docker compose -f docker-compose.yml -f docker-compose.shared-network.yml up -d
#   (attaches all services to the external `soma-stack-net` bridge)
networks:
  somabrain_standalone_net:
    driver: bridge
