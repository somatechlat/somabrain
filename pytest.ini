[pytest]
testpaths =
    tests
norecursedirs =
    .git
    .venv
    venv
    node_modules
    build
    dist
filterwarnings =
    ignore::pytest.PytestRemovedIn9Warning
markers =
    integration: exercises real service integrations
    property: property-based and invariant tests
    degraded_mode: degraded-mode resilience checks
    performance: performance-sensitive or latency tests
    slow: longer-running tests
    unit: unit-level tests
    infrastructure: infrastructure integration checks
    circuit_breaker: circuit breaker behavior checks
    cognitive_proof: cognitive proof validations
    isolation_proof: isolation proof validations
    iso_interoperability: interoperability proof coverage
    iso_reliability: reliability proof coverage
    iso_security: security proof coverage
    math_proof: mathematical proof coverage
    memory_proof: memory-system proof coverage
    tenant_isolation: tenant isolation validations
