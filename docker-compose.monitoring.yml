version: '3.8'

services:
  somabrain:
    image: somatechlat/somabrain:latest
    container_name: somabrain
    ports:
      - "9696:9696"
    restart: unless-stopped
    environment:
      - SOMABRAIN_ENV=production
    # mount config and data as needed

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
