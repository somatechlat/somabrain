<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SomaBrain | Cognitive Memory System</title>
    
    <!-- Design System -->
    <link rel="stylesheet" href="design-system/somastack-ui.css">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <div class="app-container" x-data="somaBrainApp()" x-init="init()">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">B</div>
                <span class="logo-text">SomaBrain</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Overview</div>
                    <button class="nav-item" :class="{ active: currentView === 'dashboard' }" @click="currentView = 'dashboard'">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'neuromodulators' }" @click="currentView = 'neuromodulators'">
                        <i class="fas fa-brain"></i>
                        <span>Neuromodulators</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'adaptation' }" @click="currentView = 'adaptation'">
                        <i class="fas fa-sliders-h"></i>
                        <span>Adaptation</span>
                    </button>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Memory</div>
                    <button class="nav-item" :class="{ active: currentView === 'memories' }" @click="currentView = 'memories'">
                        <i class="fas fa-database"></i>
                        <span>Memory Store</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'recall' }" @click="currentView = 'recall'">
                        <i class="fas fa-search"></i>
                        <span>Recall</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'personas' }" @click="currentView = 'personas'">
                        <i class="fas fa-user-circle"></i>
                        <span>Personas</span>
                    </button>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">System</div>
                    <button class="nav-item" :class="{ active: currentView === 'sleep' }" @click="currentView = 'sleep'">
                        <i class="fas fa-moon"></i>
                        <span>Sleep Cycles</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'health' }" @click="currentView = 'health'">
                        <i class="fas fa-heartbeat"></i>
                        <span>Health</span>
                    </button>
                    <button class="nav-item" :class="{ active: currentView === 'settings' }" @click="currentView = 'settings'">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </button>
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h1 class="page-title" x-text="getPageTitle()"></h1>
                <div class="flex gap-2">
                    <button class="header-btn" @click="toggleTheme()">
                        <i class="fas" :class="isDark ? 'fa-sun' : 'fa-moon'"></i>
                    </button>
                    <button class="header-btn" @click="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="content-area">
                <!-- Dashboard View -->
                <template x-if="currentView === 'dashboard'">
                    <div>
                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-header">
                                    <span class="stat-label">Total Memories</span>
                                    <div class="stat-icon"><i class="fas fa-database"></i></div>
                                </div>
                                <div class="stat-value" x-text="stats.totalMemories.toLocaleString()"></div>
                                <div class="stat-change positive">
                                    <i class="fas fa-arrow-up"></i>
                                    <span>+156 today</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-header">
                                    <span class="stat-label">Recall Queries</span>
                                    <div class="stat-icon"><i class="fas fa-search"></i></div>
                                </div>
                                <div class="stat-value" x-text="stats.recallQueries.toLocaleString()"></div>
                                <div class="stat-change positive">
                                    <i class="fas fa-arrow-up"></i>
                                    <span>+12.3% from yesterday</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-header">
                                    <span class="stat-label">Avg Latency</span>
                                    <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                                </div>
                                <div class="stat-value" x-text="stats.avgLatency + 'ms'"></div>
                                <div class="stat-change negative">
                                    <i class="fas fa-arrow-down"></i>
                                    <span>-8ms from avg</span>
                                </div>
                            </div>
                            
                            <div class="stat-card">
                                <div class="stat-header">
                                    <span class="stat-label">Active Personas</span>
                                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                                </div>
                                <div class="stat-value" x-text="stats.activePersonas"></div>
                                <div class="stat-change positive">
                                    <i class="fas fa-check"></i>
                                    <span>All healthy</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Neuromodulator Overview & System Health -->
                        <div class="grid grid-cols-2">
                            <!-- Neuromodulator Levels -->
                            <div class="card">
                                <div class="card-header">
                                    <span class="card-title">Neuromodulator Levels</span>
                                    <span class="badge badge-success">
                                        <span class="status-dot online"></span>
                                        Balanced
                                    </span>
                                </div>
                                <div class="card-body">
                                    <div class="neuro-gauge">
                                        <div class="neuro-gauge-header">
                                            <span class="neuro-gauge-label">Dopamine</span>
                                            <span class="neuro-gauge-value" x-text="(neuromodulators.dopamine * 100).toFixed(0) + '%'"></span>
                                        </div>
                                        <div class="neuro-gauge-bar">
                                            <div class="neuro-gauge-fill dopamine" :style="'width: ' + (neuromodulators.dopamine * 100) + '%'"></div>
                                        </div>
                                    </div>
                                    
                                    <div class="neuro-gauge">
                                        <div class="neuro-gauge-header">
                                            <span class="neuro-gauge-label">Serotonin</span>
                                            <span class="neuro-gauge-value" x-text="(neuromodulators.serotonin * 100).toFixed(0) + '%'"></span>
                                        </div>
                                        <div class="neuro-gauge-bar">
                                            <div class="neuro-gauge-fill serotonin" :style="'width: ' + (neuromodulators.serotonin * 100) + '%'"></div>
                                        </div>
                                    </div>
                                    
                                    <div class="neuro-gauge">
                                        <div class="neuro-gauge-header">
                                            <span class="neuro-gauge-label">Noradrenaline</span>
                                            <span class="neuro-gauge-value" x-text="(neuromodulators.noradrenaline * 100).toFixed(0) + '%'"></span>
                                        </div>
                                        <div class="neuro-gauge-bar">
                                            <div class="neuro-gauge-fill noradrenaline" :style="'width: ' + (neuromodulators.noradrenaline * 100) + '%'"></div>
                                        </div>
                                    </div>
                                    
                                    <div class="neuro-gauge">
                                        <div class="neuro-gauge-header">
                                            <span class="neuro-gauge-label">Acetylcholine</span>
                                            <span class="neuro-gauge-value" x-text="(neuromodulators.acetylcholine * 100).toFixed(0) + '%'"></span>
                                        </div>
                                        <div class="neuro-gauge-bar">
                                            <div class="neuro-gauge-fill acetylcholine" :style="'width: ' + (neuromodulators.acetylcholine * 100) + '%'"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- System Health -->
                            <div class="card">
                                <div class="card-header">
                                    <span class="card-title">System Health</span>
                                    <button class="btn btn-ghost btn-sm" @click="refreshHealth()">
                                        <i class="fas fa-sync-alt"></i>
                                    </button>
                                </div>
                                <div class="card-body">
                                    <template x-for="service in systemHealth" :key="service.name">
                                        <div class="flex items-center justify-between mb-4">
                                            <div class="flex items-center gap-3">
                                                <div class="stat-icon" style="width: 32px; height: 32px;">
                                                    <i :class="service.icon"></i>
                                                </div>
                                                <div>
                                                    <div class="font-medium" x-text="service.name"></div>
                                                    <div class="text-xs text-muted" x-text="service.latency + 'ms'"></div>
                                                </div>
                                            </div>
                                            <span class="badge" :class="'badge-' + service.statusType">
                                                <span class="status-dot" :class="service.status"></span>
                                                <span x-text="service.statusLabel"></span>
                                            </span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Sleep Status -->
                        <div class="card mt-6">
                            <div class="card-header">
                                <span class="card-title">Sleep Cycle Status</span>
                                <div class="flex gap-2">
                                    <button class="btn btn-secondary btn-sm" @click="triggerSleep('nrem')">
                                        <i class="fas fa-moon"></i>
                                        NREM Cycle
                                    </button>
                                    <button class="btn btn-secondary btn-sm" @click="triggerSleep('rem')">
                                        <i class="fas fa-cloud-moon"></i>
                                        REM Cycle
                                    </button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="grid grid-cols-3">
                                    <div>
                                        <div class="text-sm text-secondary mb-1">Last NREM</div>
                                        <div class="font-semibold" x-text="sleepStatus.lastNrem || 'Never'"></div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-secondary mb-1">Last REM</div>
                                        <div class="font-semibold" x-text="sleepStatus.lastRem || 'Never'"></div>
                                    </div>
                                    <div>
                                        <div class="text-sm text-secondary mb-1">Next Scheduled</div>
                                        <div class="font-semibold" x-text="sleepStatus.nextScheduled || 'Not scheduled'"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- Neuromodulators View -->
                <template x-if="currentView === 'neuromodulators'">
                    <div>
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">Neuromodulator Control</span>
                                <button class="btn btn-primary btn-sm" @click="saveNeuromodulators()">
                                    <i class="fas fa-save"></i>
                                    Save Changes
                                </button>
                            </div>
                            <div class="card-body">
                                <p class="text-secondary mb-6">
                                    Adjust neuromodulator levels to influence agent behavior. Changes affect exploration, creativity, patience, and focus.
                                </p>
                                
                                <div class="grid grid-cols-2 gap-6">
                                    <div>
                                        <label class="text-sm font-medium mb-2 block">Dopamine (Exploration & Creativity)</label>
                                        <input type="range" min="0" max="100" :value="neuromodulators.dopamine * 100" 
                                               @input="neuromodulators.dopamine = $event.target.value / 100"
                                               style="width: 100%;">
                                        <div class="flex justify-between text-xs text-muted mt-1">
                                            <span>Conservative</span>
                                            <span x-text="(neuromodulators.dopamine * 100).toFixed(0) + '%'"></span>
                                            <span>Exploratory</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="text-sm font-medium mb-2 block">Serotonin (Patience & Empathy)</label>
                                        <input type="range" min="0" max="100" :value="neuromodulators.serotonin * 100"
                                               @input="neuromodulators.serotonin = $event.target.value / 100"
                                               style="width: 100%;">
                                        <div class="flex justify-between text-xs text-muted mt-1">
                                            <span>Impatient</span>
                                            <span x-text="(neuromodulators.serotonin * 100).toFixed(0) + '%'"></span>
                                            <span>Patient</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="text-sm font-medium mb-2 block">Noradrenaline (Focus & Alertness)</label>
                                        <input type="range" min="0" max="100" :value="neuromodulators.noradrenaline * 100"
                                               @input="neuromodulators.noradrenaline = $event.target.value / 100"
                                               style="width: 100%;">
                                        <div class="flex justify-between text-xs text-muted mt-1">
                                            <span>Relaxed</span>
                                            <span x-text="(neuromodulators.noradrenaline * 100).toFixed(0) + '%'"></span>
                                            <span>Alert</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="text-sm font-medium mb-2 block">Acetylcholine (Learning & Memory)</label>
                                        <input type="range" min="0" max="100" :value="neuromodulators.acetylcholine * 100"
                                               @input="neuromodulators.acetylcholine = $event.target.value / 100"
                                               style="width: 100%;">
                                        <div class="flex justify-between text-xs text-muted mt-1">
                                            <span>Low Retention</span>
                                            <span x-text="(neuromodulators.acetylcholine * 100).toFixed(0) + '%'"></span>
                                            <span>High Retention</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- Health View -->
                <template x-if="currentView === 'health'">
                    <div>
                        <div class="grid grid-cols-2">
                            <template x-for="service in systemHealth" :key="service.name">
                                <div class="card">
                                    <div class="card-body">
                                        <div class="flex items-center gap-4 mb-4">
                                            <div class="stat-icon">
                                                <i :class="service.icon"></i>
                                            </div>
                                            <div>
                                                <h3 class="font-semibold" x-text="service.name"></h3>
                                                <span class="badge" :class="'badge-' + service.statusType">
                                                    <span class="status-dot" :class="service.status"></span>
                                                    <span x-text="service.statusLabel"></span>
                                                </span>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4 text-sm">
                                            <div>
                                                <div class="text-muted">Latency</div>
                                                <div class="font-medium" x-text="service.latency + 'ms'"></div>
                                            </div>
                                            <div>
                                                <div class="text-muted">Uptime</div>
                                                <div class="font-medium" x-text="service.uptime || '99.9%'"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
    
    <script>
        function somaBrainApp() {
            return {
                // State
                currentView: 'dashboard',
                isDark: false,
                
                // Stats
                stats: {
                    totalMemories: 45678,
                    recallQueries: 12456,
                    avgLatency: 89,
                    activePersonas: 3
                },
                
                // Neuromodulators
                neuromodulators: {
                    dopamine: 0.4,
                    serotonin: 0.5,
                    noradrenaline: 0.3,
                    acetylcholine: 0.6
                },
                
                // Sleep Status
                sleepStatus: {
                    lastNrem: '2 hours ago',
                    lastRem: '6 hours ago',
                    nextScheduled: 'In 4 hours'
                },
                
                // System Health
                systemHealth: [
                    { name: 'PostgreSQL', icon: 'fas fa-database', status: 'online', statusType: 'success', statusLabel: 'Healthy', latency: 12, uptime: '99.99%' },
                    { name: 'Redis', icon: 'fas fa-bolt', status: 'online', statusType: 'success', statusLabel: 'Healthy', latency: 3, uptime: '99.99%' },
                    { name: 'Milvus', icon: 'fas fa-cubes', status: 'online', statusType: 'success', statusLabel: 'Healthy', latency: 45, uptime: '99.95%' },
                    { name: 'API Gateway', icon: 'fas fa-server', status: 'online', statusType: 'success', statusLabel: 'Healthy', latency: 8, uptime: '99.99%' }
                ],
                
                // Methods
                getPageTitle() {
                    const titles = {
                        dashboard: 'Dashboard',
                        neuromodulators: 'Neuromodulators',
                        adaptation: 'Adaptation State',
                        memories: 'Memory Store',
                        recall: 'Recall',
                        personas: 'Personas',
                        sleep: 'Sleep Cycles',
                        health: 'System Health',
                        settings: 'Settings'
                    };
                    return titles[this.currentView] || 'Dashboard';
                },
                
                toggleTheme() {
                    this.isDark = !this.isDark;
                    document.documentElement.setAttribute('data-theme', this.isDark ? 'dark' : 'light');
                    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
                },
                
                async refreshData() {
                    // Fetch latest data from API
                    try {
                        const response = await fetch('/health');
                        if (response.ok) {
                            const data = await response.json();
                            console.log('Health data:', data);
                        }
                    } catch (error) {
                        console.error('Failed to fetch health data:', error);
                    }
                },
                
                async refreshHealth() {
                    await this.refreshData();
                },
                
                async saveNeuromodulators() {
                    try {
                        const response = await fetch('/neuromodulators', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.neuromodulators)
                        });
                        if (response.ok) {
                            alert('Neuromodulators saved successfully');
                        }
                    } catch (error) {
                        console.error('Failed to save neuromodulators:', error);
                        alert('Failed to save neuromodulators');
                    }
                },
                
                async triggerSleep(type) {
                    try {
                        const response = await fetch('/sleep/run', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nrem: type === 'nrem',
                                rem: type === 'rem'
                            })
                        });
                        if (response.ok) {
                            alert(`${type.toUpperCase()} sleep cycle triggered`);
                        }
                    } catch (error) {
                        console.error('Failed to trigger sleep:', error);
                        alert('Failed to trigger sleep cycle');
                    }
                },
                
                init() {
                    // Load theme preference
                    const savedTheme = localStorage.getItem('theme');
                    if (savedTheme === 'dark') {
                        this.isDark = true;
                        document.documentElement.setAttribute('data-theme', 'dark');
                    }
                    
                    // Initial data fetch
                    this.refreshData();
                }
            };
        }
    </script>
</body>
</html>
